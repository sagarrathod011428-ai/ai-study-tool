<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>AI Knowledge Engine</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

header{
background:#020617;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
display:flex;
height:90vh;
}

.sidebar{
width:250px;
background:#020617;
padding:15px;
overflow:auto;
}

.chat{
flex:1;
display:flex;
flex-direction:column;
}

.messages{
flex:1;
padding:20px;
overflow:auto;
}

.message{
margin-bottom:15px;
padding:10px;
border-radius:8px;
max-width:70%;
}

.user{
background:#1e293b;
margin-left:auto;
}

.ai{
background:#334155;
}

.inputBox{
padding:10px;
background:#020617;
display:flex;
gap:10px;
}

textarea{
flex:1;
height:50px;
border-radius:6px;
padding:10px;
}

button{
padding:10px 16px;
border:none;
border-radius:6px;
background:#38bdf8;
cursor:pointer;
}

.fileBox{
margin-top:20px;
}

</style>

</head>

<body>

<header>AI Knowledge Engine</header>

<div class="container">

<div class="sidebar">
<h3>Documents</h3>
<input type="file" id="fileUpload">
<div id="files"></div>
</div>

<div class="chat">

<div id="messages" class="messages"></div>

<div class="inputBox">

<textarea id="question" placeholder="Ask something..."></textarea>

<button onclick="send()">Send</button>

</div>

</div>

</div>

<script>

const messagesDiv=document.getElementById("messages");

function addMessage(text,type){

const div=document.createElement("div");

div.className="message "+type;

div.innerText=text;

messagesDiv.appendChild(div);

messagesDiv.scrollTop=messagesDiv.scrollHeight;

}

async function send(){

const question=document.getElementById("question").value;

if(!question)return;

addMessage(question,"user");

document.getElementById("question").value="";

addMessage("Thinking...","ai");

const response=await fetch(
"https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct",
{
method:"POST",
headers:{
"Authorization":"Bearer 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",
"Content-Type":"application/json"
},
body:JSON.stringify({
inputs:question
})
}
);

const data=await response.json();

messagesDiv.lastChild.innerText=data[0].generated_text;

}

document.getElementById("fileUpload").addEventListener("change",function(){

const file=this.files[0];

const div=document.createElement("div");

div.innerText=file.name;

document.getElementById("files").appendChild(div);

});

</script>

</body>
</html>
